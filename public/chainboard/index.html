<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chainboard</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.0/dist/ethers.umd.min.js"></script>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,200..900;1,200..900&display=swap");
    @import url("https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap");

    :root {
      --bg: #fafafa;
      --fg: #1c1c1c;
      --border: #1c1c1c;
      --font: "Crimson Pro", "Georgia", serif;
      --mono: "Roboto Mono", monospace;
      --max: 680px;
    }
    .dark {
      --bg: #1a1a1a;
      --fg: #e0e0e0;
      --border: #e0e0e0;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html { font-size: 18px; }
    *::selection { color: var(--bg); background: var(--fg); }

    body {
      font-family: var(--font);
      font-weight: 200;
      background: var(--bg);
      color: var(--fg);
      margin: 0;
      padding: 2rem 1rem;
      transition: background 0.2s, color 0.2s;
    }

    input, textarea {
      font-size: 1rem;
      font-family: var(--font);
      font-weight: 200;
      background: none;
      border: 1px solid var(--border);
      color: var(--fg);
      padding: 0.3em 0.5em;
      width: 100%;
      -webkit-tap-highlight-color: transparent;
    }
    input:focus, textarea:focus { outline: none; }
    
    /* Removed grabber, auto-scales via JS */
    textarea { 
      resize: none; 
      overflow: hidden; 
      min-height: 52px; 
    }

    .btn {
      display: inline-block;
      font-family: var(--font);
      font-weight: 200;
      font-size: 0.9rem;
      padding: 0.3em 0.9em;
      border: 1px solid var(--border);
      border-radius: 0;
      background: rgba(0,0,0,0.04);
      color: var(--fg);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      transition: background 0.15s;
    }
    .dark .btn { background: rgba(255,255,255,0.06); }
    .btn:hover { background: rgba(0,0,0,0.1); }
    .dark .btn:hover { background: rgba(255,255,255,0.14); }
    .btn:focus-visible { color: var(--bg); background: var(--fg); outline: none; }
    .btn.primary { background: var(--fg); color: var(--bg); }
    .btn.primary:hover { opacity: 0.8; }
    .btn.danger { border-color: #c0392b; color: #c0392b; background: transparent; }
    .btn.danger:hover { background: #c0392b; color: #fafafa; }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; pointer-events: none; }

    .icon-btn {
      background: none;
      border: none;
      color: var(--fg);
      opacity: 0.45;
      cursor: pointer;
      padding: 0.2rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s;
    }
    .icon-btn:hover { opacity: 1; }
    .icon-btn svg { display: block; }

    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      align-items: flex-start;
      justify-content: center;
      padding: 3rem 1rem;
      overflow-y: auto;
    }
    .dark .overlay { background: rgba(0,0,0,0.65); }
    .overlay.open { display: flex; }

    .modal {
      background: var(--bg);
      border: 1px solid var(--border);
      width: 100%;
      max-width: 520px;
      padding: 1.5rem;
      position: relative;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.25rem;
    }
    .modal-title {
      font-size: 1.1rem;
      font-weight: 400;
      margin: 0;
    }
    .modal-close {
      background: none;
      border: none;
      color: var(--fg);
      opacity: 0.4;
      cursor: pointer;
      padding: 0.2rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }
    .modal-close:hover { opacity: 1; }
    .modal-close svg { display: block; }

    .wrap { max-width: var(--max); margin: 0 auto; }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1rem;
      margin-bottom: 1rem;
    }
    .header-title-wrap {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    header h1 {
      font-size: 1.6rem;
      margin: 0;
      font-weight: 400;
      letter-spacing: -0.02em;
      cursor: default;
      user-select: none;
    }
    .header-actions { display: flex; gap: 0.6rem; align-items: center; }

    .section-label {
      font-family: var(--mono);
      font-size: 0.7rem;
      opacity: 0.4;
      margin-bottom: 0.75rem;
    }

    .form-group { margin-bottom: 0.65rem; }
    .form-group label {
      display: block;
      font-family: var(--mono);
      font-size: 0.72rem;
      opacity: 0.5;
      margin-bottom: 0.2rem;
    }
    .btn-row { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.75rem; }

    /* ── Inline Compose Area ──────────────────────────────── */
    #inline-compose {
      margin-bottom: 1.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    #inline-compose .btn-row {
      justify-content: flex-start;
      align-items: center;
      margin-top: 0.5rem;
    }
    #gas-estimate {
      font-family: var(--mono);
      font-size: 0.68rem;
      opacity: 0.4;
    }

    /* ── Posts ────────────────────────────────────────────── */
    .post {
      border-bottom: 1px solid var(--border);
      padding: 0.9rem 0;
    }
    .post-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 0.3rem;
    }
    .post-author {
      font-family: var(--mono);
      font-size: 0.75rem;
      opacity: 0.55;
      background: none;
      border: none;
      color: var(--fg);
      cursor: pointer;
      padding: 0;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .post-author:hover { opacity: 1; }
    .post-time   { font-family: var(--mono); font-size: 0.7rem; opacity: 0.35; }
    .post-body   { font-size: 1rem; line-height: 1.55; }

    .profile-header-wrap { display: flex; justify-content: space-between; align-items: baseline; }
    .profile-actions { display: flex; gap: 0.5rem; }
    .profile-name   { font-size: 1.2rem; font-weight: 400; }
    .profile-wallet { font-family: var(--mono); font-size: 0.7rem; opacity: 0.4; margin: 0.2rem 0 0.6rem; }
    .profile-bio    { font-size: 0.95rem; opacity: 0.75; margin-bottom: 1.25rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
    .profile-post   { border-bottom: 1px solid var(--border); padding: 0.75rem 0; font-size: 0.95rem; line-height: 1.5; }
    .profile-post-time { font-family: var(--mono); font-size: 0.7rem; opacity: 0.35; margin-top: 0.3rem; }

    /* ── Toast (Stackable, bottom center) ─────────────────── */
    #toast-container {
      position: fixed;
      bottom: 1.25rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      pointer-events: none;
    }
    .toast {
      font-family: var(--mono);
      font-size: 0.72rem;
      background: var(--bg);
      color: var(--fg);
      border: 1px solid var(--border);
      padding: 0.5rem 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.55rem;
      min-width: 200px;
      max-width: 320px;
      pointer-events: auto;
      opacity: 1;
      transition: opacity 0.4s;
    }
    .toast.fade-out { opacity: 0; }
    .toast.error { border-color: #c0392b; color: #c0392b; }
    .toast.success { border-color: #27ae60; color: #27ae60; }
    .toast-spinner {
      width: 13px;
      height: 13px;
      border: 1.5px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    .toast.error .toast-spinner,
    .toast.success .toast-spinner { display: none; }
    .toast-icon { flex-shrink: 0; display: none; }
    .toast.error .toast-icon,
    .toast.success .toast-icon { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty { opacity: 0.35; font-size: 0.9rem; padding: 0.75rem 0; }

    /* ── Post actions ─────────────────────────────────────── */
    .post-actions {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin-top: 0.5rem;
      flex-wrap: wrap;
    }
    .btn-like, .btn-reply, .btn-delete {
      font-family: var(--mono);
      font-size: 0.72rem;
      background: none;
      border: none;
      color: var(--fg);
      opacity: 0.4;
      cursor: pointer;
      padding: 0;
      user-select: none;
      transition: opacity 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-like:hover, .btn-reply:hover { opacity: 1; }
    .btn-delete { opacity: 0.35; }
    .btn-delete:hover { opacity: 1; color: #c0392b; }
    .btn-like.liked { opacity: 1; color: #c0392b; }
    .btn-like svg, .btn-reply svg, .btn-delete svg { display: block; }

    .reply-area {
      margin-top: 0.6rem;
      display: none;
    }
    .reply-area textarea {
      margin-bottom: 0.4rem;
    }
    .reply-area .btn-row { margin-top: 0; }

    .replies { margin-top: 0.4rem; }
    .reply-item {
      border-left: 1px solid var(--border);
      padding: 0.4rem 0 0.4rem 0.75rem;
      margin-top: 0.4rem;
    }
    .reply-meta {
      font-family: var(--mono);
      font-size: 0.68rem;
      opacity: 0.45;
      margin-bottom: 0.15rem;
    }
    .reply-body { font-size: 0.9rem; line-height: 1.45; }

    .no-wallet-notice {
      font-family: var(--mono);
      font-size: 0.72rem;
      opacity: 0.45;
      padding: 0.6rem 0 0.9rem;
      display: flex;
      align-items: center;
      text-align: center;
      justify-content: center;
      gap: 0.45rem;
    }
    .no-wallet-notice svg { opacity: 0.7; flex-shrink: 0; }
  </style>
</head>

<body>

<div class="wrap">
  <header>
    <div class="header-title-wrap">
      <h1 id="site-title">Chainboard</h1>
      <button class="icon-btn" onclick="loadFeed()" title="Refresh feed" aria-label="Refresh feed">

          <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>

        </svg>
      </button>
    </div>
    
    <div class="header-actions">
      <button class="icon-btn" onclick="openDownloadModal()" title="Download" aria-label="Download">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
        </svg>

      <button class="icon-btn" onclick="toggleTheme()" id="theme-btn" title="Toggle dark mode" aria-label="Toggle dark mode">
        <svg id="icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:none">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>

      <button class="icon-btn" id="wallet-btn" onclick="connectWallet()" title="Connect Wallet" aria-label="Account">
        <svg id="icon-wallet" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/>

  </header>

  <section>

      <textarea id="post-content" placeholder="What's on your mind?" maxlength="280" oninput="this.style.height='auto'; this.style.height=this.scrollHeight+'px'; estimatePostCost()"></textarea>

    <div id="feed">

</div>

<div id="toast-container"></div>

<div class="overlay" id="account-overlay">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title" id="account-modal-title">Create Account</h2>
      <button class="modal-close" id="account-close" onclick="closeAccountModal()" style="display:none" aria-label="Close">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">

    <div id="account-view" style="display:none">

        <div class="profile-name" id="av-name"></div>
        <div class="profile-actions">
          <button class="icon-btn" onclick="switchToEditMode()" title="Edit Account">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
          </button>
          <button class="icon-btn" style="color: #c0392b; opacity: 0.8;" onclick="deleteAccount()" title="Delete Account">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>

    <div id="account-form">

</div>

<div class="overlay" id="profile-overlay">

<script>
  const CONTRACT_ADDRESS = "0x2E11d15B0e6D203A49D0165418B294667ADC6C9c";
  const ABI = [
    "event AccountCreated(address indexed user, string name)",
    "event AccountUpdated(address indexed user, string name)",
    "event PostCreated(uint256 indexed id, address indexed author, string content, uint256 timestamp)",
    "event PostDeleted(uint256 indexed id)",
    "event PostLiked(uint256 indexed postId, address indexed user)",
    "event PostUnliked(uint256 indexed postId, address indexed user)",
    "event ReplyCreated(uint256 indexed postId, uint256 indexed replyId, address indexed author, string content, uint256 timestamp)",
    "function createAccount(string _name, string _bio) external",
    "function updateAccount(string _newName, string _newBio) external",
    "function deleteAccount() external",
    "function getAccount(address _user) external view returns (string name, string bio)",
    "function createPost(string _content) external returns (uint256)",
    "function deletePost(uint256 _id) external",
    "function getPost(uint256 _id) external view returns (string content, address author, uint256 timestamp)",
    "function postCount() external view returns (uint256)",
    "function getPostsPaginated(uint256 _limit, uint256 _offset) external view returns (uint256[] ids, string[] contents, address[] authors, uint256[] timestamps)",
    "function getPostsByAuthor(address _user, uint256 _limit, uint256 _offset) external view returns (uint256[] ids, string[] contents, address[] authors, uint256[] timestamps)",
    "function likePost(uint256 _id) external",
    "function unlikePost(uint256 _id) external",
    "function getLikes(uint256 _id) external view returns (uint256 count, bool liked)",
    "function createReply(uint256 _postId, string _content) external returns (uint256)",
    "function getReplies(uint256 _postId) external view returns (uint256[] ids, string[] contents, address[] authors, uint256[] timestamps)",
  ];

  let provider, signer, contract, myAddress;
  let hasAccount = false;
  let editing = false;

  const accountCache = new Map();

  async function resolveAccount(addr) {
    const key = addr.toLowerCase();
    if (accountCache.has(key)) return accountCache.get(key);
    try {
      const [name, bio] = await contract.getAccount(addr);
      const result = { name, bio };
      accountCache.set(key, result);
      return result;
    } catch(_) {
      return null;
    }
  }

  function showToast(msg, type = "", autoDismiss = false) {
    const container = document.getElementById("toast-container");
    const toast = document.createElement("div");
    toast.className = "toast" + (type ? " " + type : "");

    const spinner = document.createElement("div");
    spinner.className = "toast-spinner";

    const icon = document.createElement("span");
    icon.className = "toast-icon";
    if (type === "success") {
      icon.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
    } else if (type === "error") {
      icon.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`;
    }

    const text = document.createElement("span");
    text.textContent = msg;

    toast.appendChild(spinner);
    toast.appendChild(icon);
    toast.appendChild(text);
    container.appendChild(toast);

    const dismiss = () => {
      toast.classList.add("fade-out");
      setTimeout(() => toast.remove(), 450);
    };

    if (autoDismiss || type === "success" || type === "error") {
      setTimeout(dismiss, type ? 3500 : 8000);
    }

    return { el: toast, dismiss };
  }

  function setConnectedUI() {
    document.getElementById("icon-wallet").style.display = "none";
    document.getElementById("icon-user").style.display = "block";
    const btn = document.getElementById("wallet-btn");
    btn.onclick = () => openAccountModal(true);
    btn.title = "Profile";
    document.getElementById("inline-compose").style.display = "block";
  }

  function setDisconnectedUI() {
    document.getElementById("icon-wallet").style.display = "block";
    document.getElementById("icon-user").style.display = "none";
    const btn = document.getElementById("wallet-btn");
    btn.onclick = connectWallet;
    btn.title = "Connect Wallet";
    document.getElementById("inline-compose").style.display = "none";
  }

  async function connectWallet() {
    if (!window.ethereum) return showToast("MetaMask not found.", "error");
    try {
      provider  = new ethers.BrowserProvider(window.ethereum);
      signer    = await provider.getSigner();
      contract  = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
      myAddress = await signer.getAddress();
      showToast("Wallet connected.", "success");

      contract.removeAllListeners();
      const seenEvents = new Set();
      contract.on("PostCreated", (id, author, content, timestamp, event) => {
        const key = event?.log?.transactionHash ?? `${id}-${timestamp}`;
        if (seenEvents.has(key)) return;
        seenEvents.add(key);
        prependPost(Number(id), author, content, Number(timestamp));
      });
      contract.on("PostDeleted", (id, event) => {
        const key = event?.log?.transactionHash ?? `del-${id}`;
        if (seenEvents.has(key)) return;
        seenEvents.add(key);
        document.querySelector(`.post[data-id="${id}"]`)?.remove();
      });
      contract.on("PostLiked", (postId, user, event) => {
        const key = event?.log?.transactionHash ?? `like-${postId}-${user}`;
        if (seenEvents.has(key)) return;
        seenEvents.add(key);
        updateLikeUI(Number(postId));
      });
      contract.on("PostUnliked", (postId, user, event) => {
        const key = event?.log?.transactionHash ?? `unlike-${postId}-${user}`;
        if (seenEvents.has(key)) return;
        seenEvents.add(key);
        updateLikeUI(Number(postId));
      });
      contract.on("ReplyCreated", (postId, replyId, author, content, timestamp, event) => {
        const key = event?.log?.transactionHash ?? `reply-${postId}-${replyId}`;
        if (seenEvents.has(key)) return;
        seenEvents.add(key);
        appendReplyToDOM(Number(postId), author, content, Number(timestamp));
      });
      contract.on("AccountUpdated", (addr) => {
        accountCache.delete(addr.toLowerCase());
      });

      window.ethereum.on("accountsChanged", () => location.reload());

      await checkAccount();
    } catch(e) { showToast(e.message, "error"); }
  }

  async function checkAccount() {
    try {
      const [name, bio] = await contract.getAccount(myAddress);
      hasAccount = true;
      accountCache.set(myAddress.toLowerCase(), { name, bio });
      setConnectedUI();
      await loadFeed();
    } catch(e) {
      hasAccount = false;
      openAccountModal(false);
    }
  }

  function openAccountModal(canClose) {
    document.getElementById("account-overlay").classList.add("open");
    document.getElementById("account-close").style.display = canClose ? "block" : "none";
    if (hasAccount && canClose) showAccountView();
    else showAccountForm();
  }

  function closeAccountModal() {
    document.getElementById("account-overlay").classList.remove("open");
    editing = false;
  }

  function showAccountView() {
    document.getElementById("account-modal-title").textContent = "Your Account";
    document.getElementById("account-view").style.display = "block";
    document.getElementById("account-form").style.display = "none";
    const cached = accountCache.get(myAddress.toLowerCase());
    if (cached) {
      document.getElementById("av-name").textContent   = cached.name;
      document.getElementById("av-wallet").textContent = myAddress;
      document.getElementById("av-bio").textContent    = cached.bio;
    } else {
      contract.getAccount(myAddress).then(([name, bio]) => {
        document.getElementById("av-name").textContent   = name;
        document.getElementById("av-wallet").textContent = myAddress;
        document.getElementById("av-bio").textContent    = bio;
      });
    }
    loadAccountPosts();
  }

  async function loadAccountPosts() {
    const container = document.getElementById("av-posts");
    container.innerHTML = '<p class="empty">Loading...</p>';
    try {
      const [ids, contents, , timestamps] = await contract.getPostsByAuthor(myAddress, 50, 0);
      container.innerHTML = "";
      if (ids.length === 0) { container.innerHTML = '<p class="empty">No posts yet.</p>'; return; }
      for (let i = 0; i < ids.length; i++) {
        const date = new Date(Number(timestamps[i]) * 1000).toLocaleDateString("en-CA", {
          month: "short", day: "numeric", year: "numeric"
        });
        const el = document.createElement("div");
        el.className = "profile-post";
        el.innerHTML = `${esc(contents[i])}<div class="profile-post-time">${date}</div>`;
        container.appendChild(el);
      }
    } catch(_) { container.innerHTML = '<p class="empty">Could not load posts.</p>'; }
  }

  function showAccountForm() {
    document.getElementById("account-modal-title").textContent = editing ? "Edit Account" : "Create Account";
    document.getElementById("account-view").style.display = "none";
    document.getElementById("account-form").style.display = "block";
    document.getElementById("reg-btn").textContent = editing ? "Save Changes" : "Create Account";
    document.getElementById("reg-cancel").style.display = editing ? "inline-block" : "none";
  }

  function switchToEditMode() {
    editing = true;
    const cached = accountCache.get(myAddress.toLowerCase());
    if (cached) {
      document.getElementById("reg-name").value = cached.name;
      document.getElementById("reg-bio").value  = cached.bio;
      showAccountForm();
    } else {
      contract.getAccount(myAddress).then(([name, bio]) => {
        document.getElementById("reg-name").value = name;
        document.getElementById("reg-bio").value  = bio;
        showAccountForm();
      });
    }
  }

  function switchToViewMode() {
    editing = false;
    showAccountView();
  }

  async function submitAccount() {
    if (!contract) return showToast("Connect wallet first.", "error");
    const name = document.getElementById("reg-name").value.trim();
    const bio  = document.getElementById("reg-bio").value.trim();
    if (!name) return showToast("Name is required.", "error");
    const t = showToast(editing ? "Updating account..." : "Creating account...");
    try {
      const tx = editing
        ? await contract.updateAccount(name, bio)
        : await contract.createAccount(name, bio);
      await tx.wait();
      t.dismiss();
      showToast(editing ? "Account updated." : "Account created.", "success");
      accountCache.set(myAddress.toLowerCase(), { name, bio });
      hasAccount = true;
      editing = false;
      setConnectedUI();
      document.getElementById("account-close").style.display = "block";
      closeAccountModal();
      await loadFeed();
    } catch(e) { t.dismiss(); showToast(e.reason || e.message, "error"); }
  }

  async function deleteAccount() {
    if (!confirm("Delete your account? Your posts will remain on-chain.")) return;
    const t = showToast("Deleting account...");
    try {
      const tx = await contract.deleteAccount();
      await tx.wait();
      t.dismiss();
      hasAccount = false;
      accountCache.delete(myAddress.toLowerCase());
      showToast("Account deleted.", "success");
      setDisconnectedUI();
      closeAccountModal();
      openAccountModal(false);
    } catch(e) { t.dismiss(); showToast(e.reason || e.message, "error"); }
  }

  function openDownloadModal() {
    document.getElementById("download-overlay").classList.add("open");
  }

  function closeDownloadModal() {
    document.getElementById("download-overlay").classList.remove("open");
  }

  async function openProfileModal(address) {
    document.getElementById("profile-overlay").classList.add("open");
    document.getElementById("prof-wallet").textContent = address;
    document.getElementById("prof-posts").innerHTML = '<p class="empty">Loading...</p>';

    const cached = accountCache.get(address.toLowerCase());
    if (cached) {
      document.getElementById("prof-name").textContent = cached.name;
      document.getElementById("prof-bio").textContent  = cached.bio;
    } else {
      document.getElementById("prof-name").textContent = "Loading...";
      document.getElementById("prof-bio").textContent  = "";
      try {
        const [name, bio] = await contract.getAccount(address);
        accountCache.set(address.toLowerCase(), { name, bio });
        document.getElementById("prof-name").textContent = name;
        document.getElementById("prof-bio").textContent  = bio;
      } catch(_) {
        document.getElementById("prof-name").textContent = address.slice(0,6) + "..." + address.slice(-4);
        document.getElementById("prof-bio").textContent  = "No account registered.";
      }
    }

    try {
      const [ids, contents, , timestamps] = await contract.getPostsByAuthor(address, 50, 0);
      const container = document.getElementById("prof-posts");
      container.innerHTML = "";
      if (ids.length === 0) {
        container.innerHTML = '<p class="empty">No posts yet.</p>';
        return;
      }
      for (let i = 0; i < ids.length; i++) {
        const date = new Date(Number(timestamps[i]) * 1000).toLocaleDateString("en-CA", {
          month: "short", day: "numeric", year: "numeric"
        });
        const el = document.createElement("div");
        el.className = "profile-post";
        el.innerHTML = `${esc(contents[i])}<div class="profile-post-time">${date}</div>`;
        container.appendChild(el);
      }
    } catch(e) {
      document.getElementById("prof-posts").innerHTML = '<p class="empty">Could not load posts.</p>';
    }
  }

  function closeProfileModal() {
    document.getElementById("profile-overlay").classList.remove("open");
  }

  async function estimatePostCost() {
    if (!contract || !provider) return;
    const content = document.getElementById("post-content").value;
    const el = document.getElementById("gas-estimate");
    if (!content) { el.textContent = ""; return; }
    try {
      const gasLimit = await contract.createPost.estimateGas(content);
      const feeData  = await provider.getFeeData();
      const costEth  = ethers.formatEther(gasLimit * feeData.gasPrice);
      el.textContent = `Est. gas: ~${Number(costEth).toFixed(5)} ETH`;
    } catch(_) { el.textContent = ""; }
  }

  async function createPost() {
    if (!contract) return showToast("Connect wallet first.", "error");
    const content = document.getElementById("post-content").value.trim();
    if (!content) return showToast("Post cannot be empty.", "error");
    const t = showToast("Publishing post...");
    try {
      const tx = await contract.createPost(content);
      await tx.wait();
      document.getElementById("post-content").value = "";
      document.getElementById("post-content").style.height = 'auto';
      document.getElementById("gas-estimate").textContent = "";
      t.dismiss();
      showToast("Posted.", "success");
    } catch(e) { t.dismiss(); showToast(e.reason || e.message, "error"); }
  }

  async function deletePost(id) {
    if (!confirm("Delete this post?")) return;
    const t = showToast("Deleting post...");
    try {
      const tx = await contract.deletePost(id);
      await tx.wait();
      t.dismiss();
      showToast("Post deleted.", "success");
    } catch(e) { t.dismiss(); showToast(e.reason || e.message, "error"); }
  }

  async function toggleLike(id, btn) {
    if (!contract) return;
    const liked = btn.classList.contains("liked");
    try {
      btn.disabled = true;
      const tx = liked ? await contract.unlikePost(id) : await contract.likePost(id);
      await tx.wait();
    } catch(e) {
      showToast(e.reason || e.message, "error");
    } finally {
      btn.disabled = false;
    }
  }

  async function updateLikeUI(id) {
    const btn = document.querySelector(`.post[data-id="${id}"] .btn-like`);
    if (!btn || !contract) return;
    try {
      const [count, liked] = await contract.getLikes(id);
      btn.classList.toggle("liked", liked);
      btn.querySelector(".like-count").textContent = count.toString();
    } catch(_) {}
  }

  function toggleReply(id, btn) {
    const area = document.getElementById(`reply-area-${id}`);
    const open = area.style.display === "block";
    area.style.display = open ? "none" : "block";
    if (!open) area.querySelector("textarea").focus();
  }

  async function submitReply(id, btn) {
    if (!contract) return;
    const area    = document.getElementById(`reply-area-${id}`);
    const textarea = area.querySelector("textarea");
    const text    = textarea.value.trim();
    if (!text) return;
    const t = showToast("Publishing reply...");
    try {
      btn.disabled = true;
      const tx = await contract.createReply(id, text);
      await tx.wait();
      textarea.value = "";
      textarea.style.height = 'auto';
      area.style.display = "none";
      t.dismiss();
      showToast("Reply posted.", "success");
    } catch(e) {
      t.dismiss();
      showToast(e.reason || e.message, "error");
    } finally {
      btn.disabled = false;
    }
  }

  async function appendReplyToDOM(postId, authorAddr, content, timestamp) {
    const container = document.getElementById(`replies-${postId}`);
    if (!container) return;
    const account     = await resolveAccount(authorAddr);
    const authorLabel = account ? account.name : authorAddr.slice(0,6) + "..." + authorAddr.slice(-4);
    const el = document.createElement("div");
    el.className = "reply-item";
    el.innerHTML = `<div class="reply-meta">${esc(authorLabel)}</div><div class="reply-body">${esc(content)}</div>`;
    container.appendChild(el);
    const replyBtn = document.querySelector(`.post[data-id="${postId}"] .btn-reply .reply-count`);
    if (replyBtn) {
      const count = container.children.length;
      replyBtn.textContent = count > 0 ? count : "";
    }
  }

  async function loadReplies(postId) {
    const container = document.getElementById(`replies-${postId}`);
    if (!container || !contract) return;
    try {
      const [, contents, authors, timestamps] = await contract.getReplies(postId);
      container.innerHTML = "";
      for (let i = 0; i < contents.length; i++) {
        await appendReplyToDOM(postId, authors[i], contents[i], Number(timestamps[i]));
      }
    } catch(_) {}
  }

  const SVG_HEART_EMPTY = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`;
  const SVG_HEART_FILLED = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`;
  const SVG_REPLY = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 17 4 12 9 7"/><path d="M20 18v-2a4 4 0 0 0-4-4H4"/></svg>`;
  const SVG_TRASH = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>`;

  async function buildPostEl(id, authorAddr, authorLabel, content, timestamp) {
    const date  = new Date(timestamp * 1000).toLocaleDateString("en-CA", {
      month: "short", day: "numeric", year: "numeric"
    });
    const isOwn = myAddress && authorAddr.toLowerCase() === myAddress.toLowerCase();

    let likeCount = 0, liked = false;
    try {
      const result = await contract.getLikes(id);
      likeCount = Number(result.count);
      liked     = result.liked;
    } catch(_) {}

    const el = document.createElement("div");
    el.className = "post";
    el.dataset.id = id;
    el.innerHTML = `
      <div class="post-header">
        <button class="post-author" onclick="openProfileModal('${authorAddr}')">${esc(authorLabel)}</button>
        <span class="post-time">${date}</span>
      </div>
      <div class="post-body">${esc(content)}</div>
      <div class="post-actions">
        <button class="btn-like${liked ? " liked" : ""}" onclick="toggleLike(${id}, this)" title="${liked ? "Unlike" : "Like"}">
          ${liked ? SVG_HEART_FILLED : SVG_HEART_EMPTY}
          <span class="like-count">${likeCount > 0 ? likeCount : ""}</span>
        </button>
        <button class="btn-reply" onclick="toggleReply(${id}, this)" title="Reply">
          ${SVG_REPLY}
          <span class="reply-count"></span>
        </button>
        ${isOwn ? `<button class="btn-delete" onclick="deletePost(${id})" title="Delete post">${SVG_TRASH}</button>` : ""}
      </div>
      <div class="reply-area" id="reply-area-${id}">
        <textarea placeholder="Your reply..." oninput="this.style.height='auto'; this.style.height=this.scrollHeight+'px';"></textarea>
        <div class="btn-row">
          <button class="btn primary" onclick="submitReply(${id}, this)">Reply</button>
          <button class="btn" onclick="toggleReply(${id}, this)">Cancel</button>
        </div>
      </div>
      <div class="replies" id="replies-${id}"></div>
    `;

    setTimeout(() => loadReplies(id), 0);
    return el;
  }

  async function prependPost(id, author, content, timestamp) {
    const feed = document.getElementById("feed");
    const empty = feed.querySelector(".empty, .no-wallet-notice");
    if (empty) empty.remove();
    const account     = await resolveAccount(author);
    const authorLabel = account ? account.name : author.slice(0,6) + "..." + author.slice(-4);
    feed.prepend(await buildPostEl(id, author, authorLabel, content, timestamp));
  }

  async function loadFeed() {
    if (!contract) return;
    const feed = document.getElementById("feed");
    feed.innerHTML = "";
    const t = showToast("Loading feed...");
    try {
      const [ids, contents, authors, timestamps] = await contract.getPostsPaginated(50, 0);
      t.dismiss();
      if (ids.length === 0) { feed.innerHTML = '<p class="empty">No posts yet.</p>'; return; }
      for (let i = 0; i < ids.length; i++) {
        const account     = await resolveAccount(authors[i]);
        const authorLabel = account ? account.name : authors[i].slice(0,6) + "..." + authors[i].slice(-4);
        feed.appendChild(await buildPostEl(Number(ids[i]), authors[i], authorLabel, contents[i], Number(timestamps[i])));
      }
    } catch(e) {
      t.dismiss();
      feed.innerHTML = '<p class="empty">Could not load feed.</p>';
      console.error(e);
    }
  }

  function esc(s) {
    return String(s)
      .replace(/&/g,"&amp;").replace(/</g,"&lt;")
      .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  function toggleTheme() {
    const dark = document.body.classList.toggle("dark");
    document.getElementById("icon-sun").style.display  = dark ? "block" : "none";
    document.getElementById("icon-moon").style.display = dark ? "none"  : "block";
  }

  document.getElementById("account-overlay").addEventListener("click", function(e) {
    if (e.target === this && hasAccount) closeAccountModal();
  });
  document.getElementById("profile-overlay").addEventListener("click", function(e) {
    if (e.target === this) closeProfileModal();
  document.getElementById("download-overlay").addEventListener("click", function(e) {
    if (e.target === this) closeDownloadModal();
  }); });

  (async () => {
    if (!window.ethereum) return;
    const accounts = await window.ethereum.request({ method: "eth_accounts" });
    if (accounts.length > 0) connectWallet();
  })();
</script>
